<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg">

<div class="card">

    <div class="content">
        <h1>Quiz Completed 🎉</h1>

        <h2 id="score">0</h2>

        <p>Your Score</p>

        <a href="/"><button class="dark-btn">Play Again</button></a>
    </div>

</div>

<script>
let finalScore = {{ score }};
let count = 0;

let anim = setInterval(() => {
    document.getElementById("score").innerText = count;
    count++;

    if(count > finalScore){
        clearInterval(anim);
    }
}, 100);
</script>

</body>
</html>
